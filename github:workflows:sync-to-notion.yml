name: Sync Iowa Opposition Events to Notion

on:
  # Runs whenever master_opposition.csv is pushed to data-center-map
  repository_dispatch:
    types: [csv-updated]

  # Also allows manual trigger from the Actions tab
  workflow_dispatch:

  # Optional: run on a schedule (every day at 8am ET) as a safety net
  # Uncomment if you want scheduled pulls in addition to push-triggered ones
  # schedule:
  #   - cron: '0 13 * * *'   # 8am ET = 13:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Iowa tracker repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Iowa → Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python sync_iowa_to_notion.py

      - name: Report result
        if: always()
        run: echo "Sync complete. Check logs above for created/skipped/error counts."
