name: Notify Iowa Tracker on CSV Push

on:
  push:
    paths:
      - 'master_opposition.csv'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Iowa tracker sync
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'pricephillips',
              repo: 'Iowa-dc-tracker',
              event_type: 'csv-updated'
            });
